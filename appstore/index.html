<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Apps</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #080b12;
      --surface:     #0f1420;
      --surface2:    #161d2e;
      --border:      rgba(255,255,255,0.07);
      --border-hover:rgba(99,179,237,0.35);
      --accent:      #3b82f6;
      --accent2:     #6366f1;
      --text:        #e2e8f0;
      --muted:       #64748b;
      --muted2:      #475569;
      --success:     #22c55e;
      --radius:      20px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(59,130,246,0.12) 0%, transparent 60%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 0 16px 64px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 52px 0 40px;
    }

    .logo-ring {
      width: 64px; height: 64px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.75rem;
      margin: 0 auto 20px;
      box-shadow: 0 0 0 1px rgba(99,102,241,0.4),
                  0 8px 32px rgba(59,130,246,0.25);
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #e2e8f0 30%, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.15;
    }

    .subtitle {
      margin-top: 8px;
      font-size: 0.875rem;
      color: var(--muted);
    }

    /* ── Grid ── */
    .grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 440px;
      margin: 0 auto;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(59,130,246,0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    .card:hover {
      border-color: var(--border-hover);
      box-shadow: 0 0 0 1px rgba(99,179,237,0.1),
                  0 8px 24px rgba(0,0,0,0.4);
      transform: translateY(-1px);
    }

    /* ── Card top row ── */
    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 14px;
    }

    .app-icon {
      width: 56px; height: 56px;
      border-radius: 15px;
      background: linear-gradient(135deg, var(--surface2), #1e293b);
      border: 1px solid rgba(255,255,255,0.09);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .app-meta { flex: 1; min-width: 0; padding-top: 2px; }

    .app-name {
      font-size: 1.05rem;
      font-weight: 600;
      color: #f1f5f9;
      line-height: 1.3;
    }

    .app-version {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 5px;
    }

    .version-pill {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--accent);
      background: rgba(59,130,246,0.12);
      border: 1px solid rgba(59,130,246,0.2);
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.02em;
    }

    .build-num {
      font-size: 0.72rem;
      color: var(--muted2);
    }

    /* ── Notes ── */
    .notes {
      font-size: 0.83rem;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 14px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      border-left: 2px solid rgba(99,102,241,0.4);
    }

    /* ── Tags row ── */
    .tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .tag {
      font-size: 0.71rem;
      color: var(--muted);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      padding: 3px 10px;
      border-radius: 20px;
      display: flex; align-items: center; gap: 4px;
    }

    /* ── Download button ── */
    .download-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: 13px;
      text-decoration: none;
      letter-spacing: 0.01em;
      box-shadow: 0 4px 16px rgba(59,130,246,0.3);
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .download-btn:hover {
      opacity: 0.92;
      box-shadow: 0 6px 20px rgba(59,130,246,0.45);
    }

    .download-btn:active {
      transform: scale(0.98);
      opacity: 0.85;
    }

    /* ── Empty / error ── */
    .empty {
      text-align: center;
      padding: 80px 0;
      color: var(--muted2);
      font-size: 0.9rem;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      margin-top: 40px;
      font-size: 0.72rem;
      color: var(--muted2);
    }

    /* ── Skeleton loader ── */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }

    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 800px 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 10px;
    }

    .sk-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .sk-row { display: flex; gap: 14px; margin-bottom: 14px; }
    .sk-icon { width: 56px; height: 56px; border-radius: 15px; flex-shrink: 0; }
    .sk-lines { flex: 1; display: flex; flex-direction: column; gap: 8px; padding-top: 6px; }
    .sk-line { height: 14px; }
    .sk-line.wide { width: 60%; }
    .sk-line.narrow { width: 35%; }
    .sk-btn { height: 48px; border-radius: 13px; margin-top: 4px; }
  </style>
</head>
<body>

  <header>
    <div class="logo-ring">📦</div>
    <h1>My Apps</h1>
    <p class="subtitle" id="subtitle">Loading…</p>
  </header>

  <div class="grid" id="app-grid">
    <!-- skeleton cards while loading -->
    <div class="sk-card">
      <div class="sk-row">
        <div class="skeleton sk-icon"></div>
        <div class="sk-lines">
          <div class="skeleton sk-line wide"></div>
          <div class="skeleton sk-line narrow"></div>
        </div>
      </div>
      <div class="skeleton sk-btn"></div>
    </div>
  </div>

  <footer id="footer"></footer>

  <script>
    const ICONS = {
      wome:         '💼',
      starclash:    '⭐',
      networkangel: '🌐',
      networkangels:'🌐',
      lisnr:        '🎙️',
      blindhunter:  '🎯',
      virtueam:     '✨',
    };

    function icon(slug) {
      return ICONS[slug.toLowerCase().replace(/[^a-z]/g, '')] || '📱';
    }

    function timeAgo(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr.includes('T') ? dateStr : dateStr + 'T00:00:00Z');
      const diff = Math.floor((Date.now() - d) / 1000);
      if (diff < 3600)  return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
      return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    }

    function downloadIcon() {
      return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>`;
    }

    async function load() {
      const subtitle = document.getElementById('subtitle');
      const grid     = document.getElementById('app-grid');
      const footer   = document.getElementById('footer');

      try {
        const res  = await fetch('apps.json?v=' + Date.now());
        const data = await res.json();
        const apps = data.apps || [];

        if (apps.length === 0) {
          grid.innerHTML = '<p class="empty">No apps yet.</p>';
          subtitle.textContent = '';
          return;
        }

        subtitle.textContent = `${apps.length} app${apps.length !== 1 ? 's' : ''}`;

        grid.innerHTML = apps.map(a => {
          const build = (a.build && a.build !== '?') ? `<span class="build-num">build ${a.build}</span>` : '';
          const notes = a.notes ? `<p class="notes">${a.notes}</p>` : '';
          const tags  = [
            a.updated ? `<span class="tag">🕐 ${timeAgo(a.updated)}</span>` : '',
            a.size    ? `<span class="tag">💾 ${a.size}</span>`             : '',
          ].filter(Boolean).join('');

          return `<div class="card">
            <div class="card-top">
              <div class="app-icon">${icon(a.slug)}</div>
              <div class="app-meta">
                <div class="app-name">${a.name}</div>
                <div class="app-version">
                  <span class="version-pill">v${a.version}</span>
                  ${build}
                </div>
              </div>
            </div>
            ${notes}
            ${tags ? `<div class="tags">${tags}</div>` : ''}
            <a class="download-btn" href="${a.apk}" download="${a.slug}-${a.version}.apk">
              ${downloadIcon()} Install
            </a>
          </div>`;
        }).join('');

        if (data.updated) {
          footer.textContent = 'Synced ' + timeAgo(data.updated);
        }

      } catch (e) {
        subtitle.textContent = '';
        grid.innerHTML = '<p class="empty">Could not load apps.</p>';
      }
    }

    load();
  </script>
</body>
</html>
